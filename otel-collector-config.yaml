receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024

exporters:
  # Export to local files
  file:
    path: ./otel-data/traces.json
    rotation:
      max_megabytes: 10
      max_days: 7

  # Export to Portal26 cloud endpoint
  otlphttp/portal26:
    endpoint: https://otel-tenant1.portal26.in:4318
    headers:
      X-Tenant-ID: tenant1

  # Debug exporter for console output
  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [file, otlphttp/portal26, debug]
