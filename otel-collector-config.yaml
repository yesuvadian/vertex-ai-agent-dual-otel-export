# OpenTelemetry Collector Configuration
# Local collector that receives data and forwards to Portal26

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024

  memory_limiter:
    check_interval: 1s
    limit_mib: 512

  # Add resource attributes
  resource:
    attributes:
      - key: collector.name
        value: local-otel-collector
        action: insert

exporters:
  # Export to Portal26
  otlphttp/portal26:
    endpoint: https://otel-tenant1.portal26.in:4318
    headers:
      Authorization: Basic dGl0YW5pYW06aGVsbG93b3JsZA==
    tls:
      insecure: false

  # Export to local file (for debugging)
  file/logs:
    path: /var/log/otel/otel-logs.json
    rotation:
      max_megabytes: 100
      max_days: 7
      max_backups: 3

  file/traces:
    path: /var/log/otel/otel-traces.json
    rotation:
      max_megabytes: 100
      max_days: 7
      max_backups: 3

  file/metrics:
    path: /var/log/otel/otel-metrics.json
    rotation:
      max_megabytes: 100
      max_days: 7
      max_backups: 3

  # Console output for debugging
  debug:
    verbosity: normal
    sampling_initial: 5
    sampling_thereafter: 200

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlphttp/portal26, file/traces, debug]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlphttp/portal26, file/metrics, debug]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlphttp/portal26, file/logs, debug]

  telemetry:
    logs:
      level: info
